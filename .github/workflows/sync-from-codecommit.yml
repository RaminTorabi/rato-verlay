name: Sync from CodeCommit

on:
  schedule:
    # Run daily at 05:00 UTC - well after the pipeline (04:00 UTC
    # start) has finished. Observed runtimes on a pre-built Gentoo
    # Update AMI:
    #   - no-op (no upstream bumps detected): ~4 min
    #   - 1-3 packages bumped + version-cycle emerge + smoke + push
    #     to codecommit main/dev/test: ~15-20 min
    #   - Saturday weekly verify (every ebuild emerged): longer,
    #     budgeted under 2h
    # 60 min headroom is generous for the daily and tight for the
    # weekly. Manual workflow_dispatch is available either way.
    - cron: '0 5 * * *'
  workflow_dispatch: {}

permissions:
  id-token: write   # Required for OIDC
  contents: write   # Required to push refs to GitHub
  # NOTE: GITHUB_TOKEN cannot push commits that modify
  # .github/workflows/* files - GitHub blocks this by design,
  # regardless of any `permissions:` setting. If a CodeCommit commit
  # touches this workflow file, the sync will fail with "refusing to
  # allow a GitHub App to create or update workflow ... without
  # workflows permission". Workaround: push such commits to GitHub
  # manually from a dev machine using a PAT/SSH key with the
  # `workflow` scope. The daily/weekly bash flow never edits workflow
  # files, so this is rare.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo (main)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rato-verlay-github-sync
          aws-region: eu-north-1

      - name: Install git-remote-codecommit
        run: pip install git-remote-codecommit

      - name: Add CodeCommit remote
        run: |
          git remote add codecommit codecommit::eu-north-1://rato-verlay || \
            git remote set-url codecommit codecommit::eu-north-1://rato-verlay

      - name: Fetch all branches from CodeCommit
        run: git fetch codecommit main dev test

      - name: Sync each branch from CodeCommit to GitHub
        # The daily pipeline writes main first, then mirrors HEAD to
        # dev and test on CodeCommit. We sync all three here so the
        # GitHub mirror stays consistent across branches.
        #
        # Strategy per branch:
        #   1. Try fast-forward merge into the locally checked-out
        #      branch (only main is checked out; for others we use
        #      `git push origin <ref>:refs/heads/<branch>` directly).
        #   2. If FF is not possible (history rewrites, e.g. weekly
        #      squash that the daily then mirrors), force-push.
        #
        # `git push --force-with-lease=<branch>:<expected_sha>` is
        # the safe form: it refuses to push if origin/<branch> moved
        # since we last fetched it. Combined with the fact that this
        # workflow is the only writer to GitHub for these branches,
        # we cannot lose work.
        run: |
          set -euo pipefail
          git fetch origin main dev test || true
          for branch in main dev test; do
            cc_sha=$(git rev-parse "codecommit/${branch}")
            gh_sha=$(git rev-parse "origin/${branch}" 2>/dev/null || echo "")

            if [[ "${cc_sha}" == "${gh_sha}" ]]; then
              echo "${branch}: already in sync (${cc_sha})"
              continue
            fi

            echo "${branch}: codecommit=${cc_sha} github=${gh_sha:-<none>}"

            # Try fast-forward first (safer for normal operation).
            if [[ -n "${gh_sha}" ]] && \
               git merge-base --is-ancestor "${gh_sha}" "${cc_sha}"; then
              echo "${branch}: fast-forward push to GitHub"
              git push origin "${cc_sha}:refs/heads/${branch}"
            else
              # History diverged (weekly squash, manual rewrite, etc.).
              # Force-with-lease is the safe form: refuses if origin
              # moved since our fetch.
              echo "${branch}: force-with-lease push to GitHub"
              if [[ -n "${gh_sha}" ]]; then
                git push --force-with-lease="${branch}:${gh_sha}" \
                  origin "${cc_sha}:refs/heads/${branch}"
              else
                # No remote branch yet; create it.
                git push origin "${cc_sha}:refs/heads/${branch}"
              fi
            fi
          done
